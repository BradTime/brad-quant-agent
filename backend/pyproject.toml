[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [".venv", "tests/reports"]

[tool.ruff.lint]
# 保守集：pyflakes(F) + 部分 pycodestyle(E/W) + import 排序(I) + 易错点(B) + 升级(UP)
select = ["E", "F", "I", "B", "UP", "W"]
# 行宽不作硬约束（中文注释偏长）；B008(FastAPI Depends 默认值)、B024(接口式抽象基类)为有意为之
ignore = ["E501", "B008", "B024"]
