name: CI

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quant_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/quant_agent
      APP_ENV: test
      JWT_SECRET: ci-strong-secret-not-for-production-0123456789
      DEEPSEEK_API_KEY: ""
      # CI 不下载本地 embedding 模型、不取外部数据，保证快速且确定性
      RAG_ENABLED: "false"
      EMBEDDING_WARM_ON_START: "false"
      LLMQUANT_ENABLED: "false"
      ENABLE_SCHEDULER: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Ruff (lint)
        run: ruff check app
      - name: Init DB
        run: python -m app.cli init-db
      - name: Pytest
        run: pytest -q

  frontend:
    name: frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
