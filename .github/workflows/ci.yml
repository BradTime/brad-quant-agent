name: CI

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quant_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/quant_agent
      APP_ENV: test
      JWT_SECRET: ci-strong-secret-not-for-production-0123456789
      DEEPSEEK_API_KEY: ""
      # CI 不下载本地 embedding 模型、不取外部数据，保证快速且确定性
      RAG_ENABLED: "false"
      EMBEDDING_WARM_ON_START: "false"
      LLMQUANT_ENABLED: "false"
      ENABLE_SCHEDULER: "false"
      ENABLE_REALTIME_FETCH: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Ruff (lint)
        run: ruff check app
      - name: Upgrade database
        run: alembic upgrade head
      - name: Check schema drift
        run: alembic check
      - name: Pytest
        run: python -m pytest -q

  frontend:
    name: frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quant_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/quant_agent
      APP_ENV: test
      JWT_SECRET: ci-strong-secret-not-for-production-0123456789
      DEEPSEEK_API_KEY: ""
      RAG_ENABLED: "false"
      EMBEDDING_WARM_ON_START: "false"
      LLMQUANT_ENABLED: "false"
      ENABLE_SCHEDULER: "false"
      ENABLE_REALTIME_FETCH: "false"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_BASE_URL: ws://localhost:8000/ws/v1
      PERF_ENFORCE: "1"
      RUN_FULLSTACK_PERF: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Upgrade database
        working-directory: backend
        run: alembic upgrade head
      - name: Seed deterministic market data
        working-directory: backend
        run: python -m scripts.seed_ci_market
      - name: Check schema drift
        working-directory: backend
        run: alembic check
      - name: Start backend
        working-directory: backend
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
          for attempt in {1..30}; do
            curl --fail --silent http://localhost:8000/health && exit 0
            sleep 1
          done
          cat /tmp/backend.log
          exit 1
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build and start frontend
        working-directory: frontend
        run: |
          npm run build
          npm run start > /tmp/frontend.log 2>&1 &
          for attempt in {1..30}; do
            curl --fail --silent http://localhost:3000 >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/frontend.log
          exit 1
      - name: Install Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Playwright smoke
        working-directory: frontend
        run: npm run e2e
