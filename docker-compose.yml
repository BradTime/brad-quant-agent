# 本地一键编排：Postgres + 后端(FastAPI) + 前端(Next.js)
# 用法：docker compose up --build
# 冷启动灌演示数据：docker compose --profile seed up --build
# 说明：后端镜像构建需联网装 pip 依赖；前端镜像构建需联网拉 Google 字体。
# 默认 backend 为单体（PROCESS_ROLE=all）；拆 api/worker 时见 backend/.env.example。
services:
  postgres:
    # pgvector/pgvector:pg16 = PG16 + 预装 pgvector 扩展（RAG 向量检索用），与 postgres:16 数据格式兼容
    image: pgvector/pgvector:pg16
    container_name: quant-agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quant_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: quant-agent-backend
    # backend/.env 提供 DEEPSEEK_API_KEY、JWT_SECRET 等；下面的 environment 覆盖容器内连接地址。
    # PROCESS_ROLE=all（默认）= HTTP + 调度器 + embedding 预热同进程；生产可拆 api / worker 两容器。
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/quant_agent
      CORS_ORIGINS: http://localhost:3000
      # 本地/E2E 不依赖 SMTP；生产必须改为 false 并配置 SMTP。
      AUTH_AUTO_VERIFY_REGISTRATION: "true"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: quant-agent-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # 一次性：迁移后灌入演示行情 + 分组自选股（需 postgres 健康；profile 不随默认 up 启动）
  seed:
    profiles: ["seed"]
    build: ./backend
    container_name: quant-agent-seed
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/quant_agent
      AUTH_AUTO_VERIFY_REGISTRATION: "true"
    command: sh -c "alembic upgrade head && python scripts/seed_demo.py"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
